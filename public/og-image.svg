<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#153f6e"/>
      <stop offset="60%" style="stop-color:#1a4f8a"/>
      <stop offset="100%" style="stop-color:#1e5fa8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Main background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern overlay -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>

  <!-- Teal bottom accent -->
  <rect x="0" y="590" width="1200" height="40" fill="url(#accent)" opacity="0.5"/>

  <!-- Shield icon (WHO-GMP symbol) -->
  <g transform="translate(80, 140)">
    <path d="M56 8 L8 28 L8 56 C8 84 32 104 56 112 C80 104 104 84 104 56 L104 28 Z"
          fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <path d="M56 24 L20 40 L20 60 C20 80 38 96 56 104 C74 96 92 80 92 60 L92 40 Z"
          fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <!-- Checkmark inside shield -->
    <path d="M38 62 L50 74 L74 50" fill="none" stroke="#0d9488" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Company name - large -->
  <text x="200" y="170" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-1">HUMEDAXIVE</text>
  <text x="200" y="248" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-1">PHARMA</text>

  <!-- Private Limited tag -->
  <text x="202" y="290" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="rgba(255,255,255,0.65)" letter-spacing="4">PRIVATE LIMITED</text>

  <!-- Divider -->
  <rect x="200" y="320" width="600" height="3" fill="url(#accent)" rx="2"/>

  <!-- Tagline -->
  <text x="200" y="372" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="400" fill="rgba(255,255,255,0.85)">Trusted Pharmaceutical Manufacturer &amp; Supplier</text>
  <text x="200" y="415" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="300" fill="rgba(255,255,255,0.65)">Bihar, India · Serving Doctors, Hospitals &amp; Distributors</text>

  <!-- Certification badges -->
  <g transform="translate(200, 460)">
    <!-- WHO-GMP Badge -->
    <rect x="0" y="0" width="160" height="50" rx="6" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="80" y="20" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0d9488" text-anchor="middle" letter-spacing="1">WHO-GMP</text>
    <text x="80" y="38" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="middle">Certified</text>

    <!-- ISO Badge -->
    <rect x="175" y="0" width="140" height="50" rx="6" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="245" y="20" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0d9488" text-anchor="middle" letter-spacing="1">ISO 9001:2015</text>
    <text x="245" y="38" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="middle">Certified</text>

    <!-- FSSAI Badge -->
    <rect x="330" y="0" width="140" height="50" rx="6" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="400" y="20" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0d9488" text-anchor="middle" letter-spacing="1">FSSAI</text>
    <text x="400" y="38" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="middle">Licensed</text>
  </g>

  <!-- Right side — decorative circles -->
  <circle cx="1050" cy="200" r="180" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="200" r="120" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="1050" cy="200" r="60" fill="rgba(13,148,136,0.15)" stroke="rgba(13,148,136,0.3)" stroke-width="1.5"/>
  <!-- Cross symbol (pharmaceutical) -->
  <rect x="1028" y="168" width="44" height="14" rx="4" fill="rgba(255,255,255,0.7)"/>
  <rect x="1036" y="160" width="14" height="30" rx="4" fill="rgba(255,255,255,0.7)"/>

  <!-- Website URL at bottom -->
  <text x="600" y="612" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="rgba(255,255,255,0.8)" text-anchor="middle">humedaxivepharma.com</text>
</svg>
